<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Project</title>
       
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container">
        <div id="Calculator">
            <input type="text" id="display" readonly>
            <div class="but_container">
                <button class="cal_button" id="clr" onclick="currentDisplay=''; document.querySelector('#display').value = currentDisplay;">C</button>

                <button class="cal_button" id="div" onclick="currentDisplay+='/'; document.querySelector('#display').value = currentDisplay;">/</button>

                <button class="cal_button" id="mul" onclick="currentDisplay+='*'; document.querySelector('#display').value = currentDisplay;">*</button>


                <button class="cal_button" id="del" onclick="currentDisplay=''; document.querySelector('#display').value = currentDisplay.value.slice(0, -1);">del</button>


                <button class="cal_button" onclick="currentDisplay+='7'; document.querySelector('#display').value = currentDisplay;">7</button>

                <button class="cal_button" onclick="currentDisplay+='8'; document.querySelector('#display').value = currentDisplay;">8</button>

                <button class="cal_button" onclick="currentDisplay+='9'; document.querySelector('#display').value = currentDisplay;">9</button>

                <button class="cal_button" id="sub" onclick="currentDisplay+='-'; document.querySelector('#display').value = currentDisplay;">-</button>

                <button class="cal_button" onclick="currentDisplay+='6'; document.querySelector('#display').value = currentDisplay;">6</button>
                <button class="cal_button" onclick="currentDisplay+='5'; document.querySelector('#display').value = currentDisplay;">5</button>
                <button class="cal_button" onclick="currentDisplay+='4'; document.querySelector('#display').value = currentDisplay;">4</button>
                <button class="cal_button" id="add"  onclick="currentDisplay+='+'; document.querySelector('#display').value = currentDisplay;">+</button>
                <button class="cal_button" onclick="currentDisplay+='1'; document.querySelector('#display').value = currentDisplay;">1</button>

                <button class="cal_button" onclick="currentDisplay+='2'; document.querySelector('#display').value = currentDisplay;">2</button>

                <button class="cal_button" onclick="currentDisplay+='3'; document.querySelector('#display').value = currentDisplay;">3</button>


                <button class="cal_button" id="equal" onclick= " let result = eval(currentDisplay); currentDisplay = result; document.querySelector('#display').value = currentDisplay;">=</button>


                <button class="cal_button" id="rem" onclick="currentDisplay+='%'; document.querySelector('#display').value = currentDisplay;">%</button>

                <button class="cal_button" onclick="currentDisplay+='0'; document.querySelector('#display').value = currentDisplay;">0</button>

                <button class="cal_button" id="dot" onclick="currentDisplay+='.'; document.querySelector('#display').value = currentDisplay;">.</button>

                <button class="cal_button" id="ex">!</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
